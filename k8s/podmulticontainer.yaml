# pod maifest for nginx app

apiVersion: v1 #simple key value
kind: Pod # simple key value
metadata: # dictonary
  name: nginx-pod #simple key vaule
spec: # dictonary
  containers: # list 
  - name: c1 
    image: nginx
    ports:
    - containerPort: 80  
  - name: c2
    image: ubuntu:22.04
    command: ["sleep"]
    args: ["300"]