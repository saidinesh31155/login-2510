apiVersion: apps/v1
kind: Deployment
metadata:
  # Unique key of the Deployment instance
  name: lms
spec:
  # 3 Pods should exist at all times.
  replicas: 1
  selector:
    matchLabels:
      app: lms
  template:
    metadata:
      labels:
        # Apply this label to pods and default
        # the Deployment label selector to this value
        app: lms
    spec:
      containers:
      - name: c1
        # Run this image
        image: saidinesh12/react-app
        ports:
        - containerPort: 80
